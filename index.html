<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Время МСК</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4e54c8 0%, #8f94fb 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .card {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            padding: 40px 32px 32px 32px;
            min-width: 320px;
            max-width: 90vw;
            text-align: center;
            position: relative;
            animation: fadeIn 1s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .clock-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.85;
        }
        h1 {
            font-size: 2em;
            margin: 0 0 10px 0;
            color: #4e54c8;
        }
        #time {
            font-size: 2.5em;
            margin-top: 20px;
            font-weight: bold;
            color: #222;
            letter-spacing: 2px;
            transition: color 0.3s;
            text-shadow: 0 2px 8px rgba(78,84,200,0.08);
        }
        .date {
            font-size: 1.1em;
            color: #666;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="card">
        <svg class="clock-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="24" cy="24" r="20" stroke="#4e54c8" stroke-width="4" fill="#f5f6fa"/>
            <rect x="22.5" y="13" width="3" height="13" rx="1.5" fill="#4e54c8"/>
            <rect x="24" y="24" width="10" height="3" rx="1.5" fill="#4e54c8" transform="rotate(45 24 24)"/>
        </svg>
        <h1>Текущее время (МСК)</h1>
        <div id="time"></div>
        <div class="date" id="date"></div>
    </div>
    <script>
        function updateTime() {
            const now = new Date();
            // МСК = UTC+3
            const msk = new Date(now.getTime() + (now.getTimezoneOffset() + 180) * 60000);
            const timeStr = msk.toLocaleTimeString('ru-RU');
            const dateStr = msk.toLocaleDateString('ru-RU', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('time').textContent = timeStr;
            document.getElementById('date').textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
