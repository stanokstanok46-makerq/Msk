<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Змейка (мини-игра)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4e54c8 0%, #8f94fb 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .card {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            padding: 40px 32px 32px 32px;
            min-width: 320px;
            max-width: 90vw;
            text-align: center;
            position: relative;
            animation: fadeIn 1s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .clock-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.85;
        }
        h1 {
            font-size: 2em;
            margin: 0 0 10px 0;
            color: #4e54c8;
        }
        #time {
            font-size: 2.5em;
            margin-top: 20px;
            font-weight: bold;
            color: #222;
            letter-spacing: 2px;
            transition: color 0.3s;
            text-shadow: 0 2px 8px rgba(78,84,200,0.08);
        }
        .date {
            font-size: 1.1em;
            color: #666;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Змейка</h1>
        <canvas id="gameCanvas" width="320" height="320"></canvas>
        <div class="score" id="score">Счёт: 0</div>
        <div class="controls">Управление: стрелки или свайпы</div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 16;
        const tileCount = 20;
        let snake = [{x: 10, y: 10}];
        let direction = {x: 0, y: 0};
        let food = {x: 15, y: 15};
        let score = 0;
        let gameOver = false;
        let moveQueue = [];

        function draw() {
            ctx.fillStyle = '#f5f6fa';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Еда
            ctx.fillStyle = '#ff5e62';
            ctx.beginPath();
            ctx.arc((food.x + 0.5) * gridSize, (food.y + 0.5) * gridSize, gridSize/2.5, 0, 2 * Math.PI);
            ctx.fill();

            // Змейка
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = i === 0 ? '#4e54c8' : '#8f94fb';
                ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize, gridSize);
            }
        }

        function placeFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            food = newFood;
        }

        function update() {
            if (gameOver) return;
            // Очередь движений (для плавности)
            if (moveQueue.length) {
                direction = moveQueue.shift();
            }
            if (direction.x === 0 && direction.y === 0) return;
            const newHead = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};
            // Проверка на выход за границы
            if (newHead.x < 0 || newHead.x >= tileCount || newHead.y < 0 || newHead.y >= tileCount) {
                endGame();
                return;
            }
            // Проверка на самоукус
            if (snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
                endGame();
                return;
            }
            snake.unshift(newHead);
            // Проверка на еду
            if (newHead.x === food.x && newHead.y === food.y) {
                score++;
                document.getElementById('score').textContent = 'Счёт: ' + score;
                placeFood();
            } else {
                snake.pop();
            }
        }

        function endGame() {
            gameOver = true;
            document.getElementById('score').textContent = 'Игра окончена! Счёт: ' + score;
        }

        function gameLoop() {
            update();
            draw();
            if (!gameOver) setTimeout(gameLoop, 100);
        }

        // Управление с клавиатуры
        document.addEventListener('keydown', function(e) {
            let newDir;
            if (e.key === 'ArrowUp' && direction.y !== 1) newDir = {x: 0, y: -1};
            else if (e.key === 'ArrowDown' && direction.y !== -1) newDir = {x: 0, y: 1};
            else if (e.key === 'ArrowLeft' && direction.x !== 1) newDir = {x: -1, y: 0};
            else if (e.key === 'ArrowRight' && direction.x !== -1) newDir = {x: 1, y: 0};
            if (newDir) moveQueue.push(newDir);
        });

        // Управление свайпами (для мобильных)
        let touchStartX = null, touchStartY = null;
        canvas.addEventListener('touchstart', function(e) {
            const t = e.touches[0];
            touchStartX = t.clientX;
            touchStartY = t.clientY;
        });
        canvas.addEventListener('touchend', function(e) {
            if (touchStartX === null || touchStartY === null) return;
            const t = e.changedTouches[0];
            const dx = t.clientX - touchStartX;
            const dy = t.clientY - touchStartY;
            let newDir;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 20 && direction.x !== -1) newDir = {x: 1, y: 0};
                else if (dx < -20 && direction.x !== 1) newDir = {x: -1, y: 0};
            } else {
                if (dy > 20 && direction.y !== -1) newDir = {x: 0, y: 1};
                else if (dy < -20 && direction.y !== 1) newDir = {x: 0, y: -1};
            }
            if (newDir) moveQueue.push(newDir);
            touchStartX = null;
            touchStartY = null;
        });

        placeFood();
        draw();
        setTimeout(gameLoop, 400);
    </script>
</body>
</html>
